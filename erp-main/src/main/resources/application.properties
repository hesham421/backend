# ========================================
# ERP System - Unified Configuration
# ========================================
# Central configuration file for all modules
# NO other application.properties files allowed in modules
# ========================================

# ========================================
# Server Configuration
# ========================================
server.port=7272
server.forward-headers-strategy=framework
spring.application.name=erp-system
# Active profile: change to 'dev' for local development
spring.profiles.active=dev  
# Or set via environment variable: SPRING_PROFILES_ACTIVE=dev
# Docker: --spring.profiles.active=prod is set in Dockerfile

# ========================================
# Database Configuration - PostgreSQL
# ========================================
# Use environment variables for all database credentials.
# Dev defaults are defined in application-dev.properties.
# Prod values MUST be supplied via environment variables — no fallback here.
# spring.datasource.url=${DB_URL}
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.hikari.connection-test-query=SELECT 1

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# JPA/Hibernate Configuration
# ========================================
# DDL must be explicitly controlled per profile. Default is none (safe).
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Slow query logging (performance monitoring)
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=500

# ========================================
# Flyway Database Migration
# ========================================
# erp-main is the single entry point that owns the shared schema — module
# repos (erp-security, erp-masterdata, ...) must not run their own migrations.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ========================================
# ERP Security Module Configuration
# ========================================
# Namespace: erp.security.*

# JWT Configuration
# JWT_SECRET MUST be set as an environment variable. No default - app will fail to start without it.
erp.security.jwt.secret=${JWT_SECRET:fallback-dev-secret-minimum-256-bits-long-replace-in-prod}
erp.security.jwt.access-expiration-seconds=28800
erp.security.jwt.refresh-expiration-seconds=604800

# Cookie Configuration
# domain intentionally left unset -> host-only cookie (see CookieProperties.domain
# javadoc: an explicit Domain=localhost breaks RFC-2965 cookie clients like Python requests)
erp.security.cookie.path=/
erp.security.cookie.secure=false
erp.security.cookie.http-only=true
erp.security.cookie.same-site=Lax

# CORS Configuration
erp.security.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://localhost:4201,http://127.0.0.1:4201

# Refresh Token Cleanup (scheduled job)
erp.security.token-cleanup.cron=0 0 3 * * *
erp.security.token-cleanup.revoked-retention-days=30

# Login Rate Limiting (brute-force protection on /api/auth/login)
erp.security.rate-limit.login.max-attempts=5
erp.security.rate-limit.login.window-seconds=60
erp.security.rate-limit.login.lockout-seconds=300

# ========================================
# ERP Master Data Module Configuration
# ========================================
# Namespace: erp.masterdata.*

# ========================================
# ERP Finance GL Module Configuration
# ========================================
# Namespace: erp.finance.gl.*

# (Add GL-specific configuration here when needed)
# erp.finance.gl.max-tree-depth=10

# ========================================
# ERP File Service Module Configuration
# ========================================
# Namespace: erp.file.*
# Encrypted Token layer (CORE.md deviation, ARCH-REF-1.10 AD-FILE-02/03) — AES/256-GCM key
# derived from this secret via SHA-256, NOT a JWT. FILE_TOKEN_SECRET MUST be set as an
# environment variable in production. No default there - fallback below is dev-only.
erp.file.token.secret=${FILE_TOKEN_SECRET:fallback-dev-file-token-secret-replace-in-prod}
erp.file.token.ttl-minutes=100

# Multipart upload limits — POLICY-CLI-01 two-tier: 10MB transport ceiling (here) is a hard
# stop before the request body is even read; the 5MB (default) business limit is enforced
# per-request in FileUploadService against FileCategory.resolveMaxSizeBytes().
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# Cache Configuration
# ========================================
spring.cache.type=redis
spring.cache.cache-names=userById,userRoles,roleById,permissionByName,permissionsList,userMenus

# Redis Connection
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ========================================
# Logging Configuration
# ========================================
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.level.com.erp=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG

# ========================================
# Spring Boot Actuator
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ========================================
# SpringDoc OpenAPI Configuration
# ========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.groups-order=ASC
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.validator-url=none
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# Show actuator endpoints in Swagger (optional)
springdoc.show-actuator=false

# Default expansion (none, list, full)
springdoc.swagger-ui.doc-expansion=list

# Persist authorization across page reloads
springdoc.swagger-ui.persist-authorization=true

# API Groups are configured in OpenApiConfig.java
# Groups: 0-all, 1-security, 2-masterdata, 3-finance-gl

# ========================================
# Internationalization (i18n)
# ========================================
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600

# ========================================
# Jackson JSON Configuration
# ========================================
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSXXX
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null
# Reject unknown JSON properties (RULE-ORG-014/016 style immutable/unrecognized-field guards rely
# on this): Spring Boot 4's autoconfigured Jackson 3 ObjectMapper is what actually deserializes
# @RequestBody, NOT the hand-built com.fasterxml.jackson (Jackson 2) bean in CommonJacksonConfig
# (see its class-level note) — so this must be set here, via the spring.jackson.* property Boot
# applies to its own mapper, rather than via that bean.
spring.jackson.deserialization.fail-on-unknown-properties=true
