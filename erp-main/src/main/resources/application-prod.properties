# ========================================
# ERP System - Production Profile
# ========================================
# Host: 89.117.37.75
# Activate with: --spring.profiles.active=prod
# ========================================

# ========================================
# Production Database - Oracle on same host
# ========================================
# DB_URL MUST be set as environment variable in production. No fallback.
spring.datasource.url=${DB_URL}
# DB_USERNAME and DB_PASSWORD MUST be set as environment variables in production. No fallback.
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Connection Pool - Production tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# ========================================
# JPA - Production Settings
# ========================================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none

# ========================================
# Security - Production Settings
# ========================================
# JWT_SECRET MUST be set as environment variable in production. No fallback.
erp.security.jwt.secret=${JWT_SECRET}
erp.security.jwt.access-expiration-seconds=3600
erp.security.jwt.refresh-expiration-seconds=86400
erp.security.cookie.domain=89.117.37.75
# Set to true when HTTPS is configured. Currently HTTP only.
erp.security.cookie.secure=false
erp.security.cookie.same-site=Lax

# CORS - Allow frontend on same host
erp.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://89.117.37.75,http://89.117.37.75:80,http://89.117.37.75:8080,http://89.117.37.75:4200}

# ========================================
# Redis - Production
# REDIS_HOST and REDIS_PORT MUST be set as environment variables in production.
# ========================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}

# ========================================
# Logging - Production (minimal)
# ========================================
logging.level.root=WARN
logging.level.com.example=INFO
logging.level.com.erp=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ========================================
# Swagger - DISABLED in production (security requirement)
# ========================================
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ========================================
# Cache / Redis - Production
# Redis runs as its own container in deploy/docker-compose.yml, with the
# backend's startup gated on its healthcheck (depends_on: redis: condition:
# service_healthy), so it is guaranteed available before the app starts.
# Matches spring.cache.type=redis in application.properties (dev).
# ========================================
spring.cache.type=redis

# ========================================
# Actuator - Secured in Production
# ========================================
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=never
